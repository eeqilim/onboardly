spring.application.name=employee-service
server.port=8082

# Eureka
eureka.client.enabled=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/employee_db

# AWS / S3 — supply credentials via env vars (AWS_ACCESS_KEY / AWS_SECRET_KEY / S3_BUCKET)
spring.cloud.aws.region.static=${AWS_REGION:us-east-1}
spring.cloud.aws.credentials.access-key=${AWS_ACCESS_KEY:}
spring.cloud.aws.credentials.secret-key=${AWS_SECRET_KEY:}
app.s3.bucket-name=${S3_BUCKET:onboardly-employee-documents-dev}

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.template.default-topic=visa-workflow-events
spring.kafka.producer.properties.spring.json.add.type.headers=false

# Security — dev placeholder default; supply a real 32-byte Base64 key via env in production
app.security.ssn-encryption-key=${SSN_ENCRYPTION_KEY:AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8=}
# Must match security.jwt.token.key in auth-server
security.jwt.token.key=${JWT_SECRET_KEY:dev-local-only-change-me-jwt-signing-key-min-32-bytes}

# Actuator + Swagger
management.endpoints.web.exposure.include=*
springdoc.swagger-ui.path=/swagger-ui.html
