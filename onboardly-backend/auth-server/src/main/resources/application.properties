spring.application.name=auth-server
server.port=8081
## local
#spring.datasource.url=jdbc:mysql://localhost:3306/auth_db?useSSL=false&serverTimezone=America/New_York

# Database — supply DB_URL / DB_USERNAME / DB_PASSWORD via env vars in non-local environments
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/onboardly?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/New_York}
spring.jackson.time-zone=America/New_York

spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000

spring.jpa.open-in-view=false
management.health.db.enabled=false

security.jwt.token.key=${JWT_SECRET_KEY:dev-local-only-change-me-jwt-signing-key-min-32-bytes}
security.jwt.token.expiration=86400000

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

registration.token.expiration.hours=3

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

spring.kafka.bootstrap-servers=localhost:9092
kafka.topic.email=email-topic
